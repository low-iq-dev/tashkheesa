<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <!-- warm cream background tint visible via parent, no bg here -->
  
  <!-- desk surface line -->
  <path d="M30 160 L250 160" stroke="#E5E9EE" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- stack of papers (background) -->
  <rect x="60" y="120" width="70" height="40" rx="3" fill="#FDFBF6" stroke="#0B6B5F" stroke-width="1.5"/>
  <path d="M70 132 L120 132 M70 140 L115 140 M70 148 L100 148" stroke="#0B6B5F" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  
  <!-- stethoscope -->
  <g stroke="#0B6B5F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M175 50 L175 85 C 175 98, 185 108, 195 108 C 205 108, 215 98, 215 85 L 215 50"/>
    <path d="M170 50 L175 50 L175 55 M210 50 L215 50 L215 55"/>
    <path d="M195 108 L195 130 C 195 136, 200 140, 206 140 L 218 140"/>
  </g>
  <!-- stethoscope bell -->
  <circle cx="225" cy="140" r="10" fill="#F2E4C7" stroke="#B38B3E" stroke-width="2"/>
  <circle cx="225" cy="140" r="3.5" fill="#B38B3E"/>
  
  <!-- floating document (top) with small brass corner -->
  <rect x="100" y="50" width="56" height="70" rx="3" fill="#FFFFFF" stroke="#0B6B5F" stroke-width="1.5"/>
  <path d="M110 68 L146 68 M110 76 L146 76 M110 84 L140 84 M110 92 L146 92 M110 100 L132 100" stroke="#0B6B5F" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <rect x="109" y="58" width="12" height="5" rx="1" fill="#B38B3E"/>
  
  <!-- small heart pulse line under document -->
  <path d="M70 108 L85 108 L90 100 L95 116 L100 108 L108 108" stroke="#B38B3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- notification dot (top-right of doc) -->
  <circle cx="156" cy="50" r="5" fill="#B38B3E"/>
  <circle cx="156" cy="50" r="5" fill="none" stroke="#B38B3E" stroke-width="1" opacity="0.3">
    <animate attributeName="r" from="5" to="10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.3" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
